;; LMS-MikroTik-LastOnline.py - przykładowy plik konfiguracyjny

[database]
type      = "mysql"          ; mysql lub postgres
host      = "127.0.0.1"
port      = "3306"
user      = "lms_user"
password  = "CHANGE_ME"
database  = "lms"

;;; Legenda:
;;   type - mysql / postgres
;;   host - adres IP / domena
;;   port - port bazy
;;   user - użytkownik bazy
;;   password - hasło użytkownika bazy
;;   database - nazwa bazy



[ping]
binary    = "/bin/ping"
count     = "3"
interface = ""

;;; Legenda:
;;   binary - ścieżka do binarki ping
;;   count - liczba pakietów
;;   interface - opcjonalny interfejs źródłowy



[port-test]
port-test = "socket"

;;; Legenda:
;;   port-test - socket / netcat / ncat / hping / hping3
;;   aktualna wersja skryptu używa domyślnie testu TCP przez socket



[hping]
binary    = "/usr/sbin/hping3"
count     = "3"
interface = ""



[netcat]
binary  = "/bin/netcat"
gateway = ""
timeout = "5"



[ncat]
binary  = "/bin/ncat"
timeout = "5"



[logs]
logs       = "yes"
what       = "all"
dir        = "./log"
old-remove = "15"

;;; Legenda:
;;   logs - yes / no
;;   what - done / error / all
;;   dir - katalog logów
;;   old-remove - liczba dni lub no



[other]
block-other-version-dblms = "no"

;;; Ta opcja została zostawiona tylko dla zgodności z wcześniejszym formatem.



[send-logs]
send-logs     = "no"
logs-what     = "all"
to-mail       = "admin@example.com"
from-mail     = "noreply@example.com"
smtp-login    = "noreply@example.com"
smtp-password = "CHANGE_ME"
smtp-host     = "mail.example.com"
smtp-port     = "587"
smtp-auth     = "PLAIN"

;;; Aktualna wersja Pythona może tych opcji jeszcze nie używać,
;;; ale sekcja została zostawiona dla zgodności z dotychczasową strukturą.
